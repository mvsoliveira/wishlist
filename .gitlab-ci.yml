stages:
  - compilation
  - simulation

wishlist_compilation:
  stage: compilation
  script:
    - conda activate wishlist
    - python python/wishlist.py examples/L1CaloGfex.yaml
    - python python/wishlist.py examples/example.yaml
  tags:
    - wishlist
    - cocotb
  artifacts:
    paths:
      - firmware
      - software

uhal_simulation:
  stage: simulation
  script:
    - source /cvmfs/atlas.cern.ch/repo/sw/tdaq/tdaq/tdaq-10-01-00/installed/setup.sh
    - python3 python/uhal_dummy_connection.py software/l1calogfex_uhal.xml
  tags:
    - wishlist

example_cocotb_simulation:
  stage: simulation
  script:
    - conda activate wishlist
    - cd simulation
    - GUI=0 DESIGN=example make
  tags:
    - cocotb

l1calogfex_cocotb_simulation:
  stage: simulation
  script:
    - conda activate wishlist
    - cd simulation
    - GUI=0 DESIGN=l1calogfex make
  tags:
    - cocotb