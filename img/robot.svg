<svg width="760" height="260" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
    <filter id="sh">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000022"/>
    </filter>
  </defs>

  <rect width="760" height="260" fill="#f7fafc" rx="10"/>

  <!-- Back-annotated YAML -->
  <rect x="20" y="100" width="120" height="60" rx="7" fill="#744210" filter="url(#sh)"/>
  <text x="80" y="124" text-anchor="middle" font-size="10" font-weight="bold" fill="#fefcbf">Back-annotated</text>
  <text x="80" y="140" text-anchor="middle" font-size="10" fill="#fefcbf">YAML</text>
  <text x="80" y="154" text-anchor="middle" font-size="9" fill="#fbd38d">(addresses + masks)</text>

  <line x1="140" y1="130" x2="168" y2="130" stroke="#4a5568" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Wishlist Robot -->
  <rect x="170" y="85" width="130" height="90" rx="7" fill="#2b6cb0" filter="url(#sh)"/>
  <text x="235" y="112" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Wishlist</text>
  <text x="235" y="128" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Robot</text>
  <text x="235" y="148" text-anchor="middle" font-size="8.5" fill="#bee3f8">read / write /</text>
  <text x="235" y="162" text-anchor="middle" font-size="8.5" fill="#bee3f8">read-modify-write</text>

  <!-- Robot ↔ MPSoC arrow (bidirectional) -->
  <line x1="300" y1="130" x2="328" y2="130" stroke="#4a5568" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="328" y1="130" x2="300" y2="130" stroke="#4a5568" stroke-width="1.8"/>

  <!-- MPSoC / AXI Driver box -->
  <rect x="330" y="85" width="130" height="90" rx="7" fill="#276749" filter="url(#sh)"/>
  <text x="395" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Zynq / Versal</text>
  <text x="395" y="128" text-anchor="middle" font-size="11" font-weight="bold" fill="white">MPSoC</text>
  <text x="395" y="148" text-anchor="middle" font-size="8.5" fill="#c6f6d5">AXIDriver</text>
  <text x="395" y="162" text-anchor="middle" font-size="8.5" fill="#c6f6d5">/dev/mem · mmap</text>

  <!-- Robot → Pickle -->
  <line x1="235" y1="175" x2="235" y2="210" stroke="#4a5568" stroke-width="1.8" marker-end="url(#arr)"/>
  <rect x="170" y="212" width="130" height="34" rx="6" fill="#2d3748" filter="url(#sh)"/>
  <text x="235" y="229" text-anchor="middle" font-size="10" fill="#e2e8f0">archive</text>
  <text x="235" y="243" text-anchor="middle" font-size="10" fill="#a0aec0">.pickle files</text>

  <!-- Pickle → Plot -->
  <line x1="300" y1="229" x2="358" y2="229" stroke="#4a5568" stroke-width="1.8" marker-end="url(#arr)"/>
  <rect x="360" y="212" width="130" height="34" rx="6" fill="#553c9a" filter="url(#sh)"/>
  <text x="425" y="229" text-anchor="middle" font-size="10" fill="#e9d8fd">Plotly website</text>
  <text x="425" y="243" text-anchor="middle" font-size="10" fill="#d6bcfa">online monitoring</text>

  <!-- stress test label -->
  <rect x="170" y="20" width="130" height="48" rx="6" fill="#e2e8f0" stroke="#cbd5e0" stroke-width="1"/>
  <text x="235" y="38" text-anchor="middle" font-size="9" font-weight="bold" fill="#2d3748">stress_test()</text>
  <text x="235" y="52" text-anchor="middle" font-size="8.5" fill="#4a5568">random stimuli · N iterations</text>
  <text x="235" y="64" text-anchor="middle" font-size="8.5" fill="#4a5568">shuffled order · error check</text>
  <line x1="235" y1="68" x2="235" y2="85" stroke="#4a5568" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- monitoring label -->
  <rect x="490" y="85" width="130" height="90" rx="6" fill="#e2e8f0" stroke="#cbd5e0" stroke-width="1"/>
  <text x="555" y="108" text-anchor="middle" font-size="9" font-weight="bold" fill="#2d3748">launch_online_monitoring()</text>
  <text x="555" y="124" text-anchor="middle" font-size="8.5" fill="#4a5568">zero-deadtime accumulators</text>
  <text x="555" y="140" text-anchor="middle" font-size="8.5" fill="#4a5568">custom conversion lambdas</text>
  <text x="555" y="156" text-anchor="middle" font-size="8.5" fill="#4a5568">live table display</text>
  <text x="555" y="170" text-anchor="middle" font-size="8.5" fill="#4a5568">save to pickle / plot</text>
  <line x1="490" y1="130" x2="460" y2="130" stroke="#4a5568" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#arr)"/>
</svg>
