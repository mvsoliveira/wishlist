<svg width="860" height="320" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2b6cb0"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="320" fill="#f7fafc" rx="10"/>

  <!-- ── User Software cloud ── -->
  <ellipse cx="108" cy="160" rx="98" ry="128" fill="#ebf8ff" stroke="#90cdf4" stroke-width="1.5"/>
  <text x="108" y="52" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b6cb0">User Software</text>

  <rect x="30" y="70"  width="156" height="20" rx="4" fill="#ffffff" stroke="#bee3f8" stroke-width="1"/>
  <text x="108" y="84" text-anchor="middle" font-size="10" fill="#2c5282">pll_lock</text>

  <rect x="30" y="96"  width="156" height="20" rx="4" fill="#ffffff" stroke="#bee3f8" stroke-width="1"/>
  <text x="108" y="110" text-anchor="middle" font-size="10" fill="#2c5282">fir_tap[3]</text>

  <rect x="30" y="122" width="156" height="20" rx="4" fill="#ffffff" stroke="#bee3f8" stroke-width="1"/>
  <text x="108" y="136" text-anchor="middle" font-size="10" fill="#2c5282">counter_rate</text>

  <rect x="30" y="148" width="156" height="20" rx="4" fill="#ffffff" stroke="#bee3f8" stroke-width="1"/>
  <text x="108" y="162" text-anchor="middle" font-size="10" fill="#2c5282">512-bit enable flag</text>

  <rect x="30" y="174" width="156" height="20" rx="4" fill="#ffffff" stroke="#bee3f8" stroke-width="1"/>
  <text x="108" y="188" text-anchor="middle" font-size="10" fill="#2c5282">snapshot_output</text>

  <rect x="30" y="200" width="156" height="20" rx="4" fill="#ffffff" stroke="#bee3f8" stroke-width="1"/>
  <text x="108" y="214" text-anchor="middle" font-size="10" fill="#2c5282">sys_reset</text>

  <!-- ── Wishlist SW + Protocol SW ── -->
  <rect x="228" y="108" width="100" height="44" rx="6" fill="#2b6cb0" filter="url(#shadow)"/>
  <text x="278" y="126" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Wishlist</text>
  <text x="278" y="141" text-anchor="middle" font-size="10" fill="#bee3f8">software</text>

  <rect x="228" y="162" width="100" height="44" rx="6" fill="#4299e1" filter="url(#shadow)"/>
  <text x="278" y="180" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Protocol</text>
  <text x="278" y="195" text-anchor="middle" font-size="10" fill="#ebf8ff">software</text>

  <!-- ── Narrow pipe ── -->
  <rect x="342" y="192" width="176" height="28" rx="5" fill="#2d3748"/>
  <text x="430" y="210" text-anchor="middle" font-size="9" fill="#e2e8f0" letter-spacing="0.3">VMEbus · PCIe · AXI · IPbus</text>

  <!-- pipe label -->
  <text x="430" y="182" text-anchor="middle" font-size="9" fill="#718096" font-style="italic">very narrow pipe</text>

  <!-- arrows SW side -->
  <line x1="186" y1="130" x2="226" y2="130" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="186" y1="190" x2="226" y2="190" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="278" y1="152" x2="278" y2="162" stroke="#4a5568" stroke-width="1.5"/>
  <line x1="328" y1="180" x2="342" y2="202" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Protocol FW + Wishlist FW ── -->
  <rect x="532" y="108" width="100" height="44" rx="6" fill="#4299e1" filter="url(#shadow)"/>
  <text x="582" y="126" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Protocol</text>
  <text x="582" y="141" text-anchor="middle" font-size="10" fill="#ebf8ff">firmware</text>

  <rect x="532" y="162" width="100" height="44" rx="6" fill="#2b6cb0" filter="url(#shadow)"/>
  <text x="582" y="180" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Wishlist</text>
  <text x="582" y="195" text-anchor="middle" font-size="10" fill="#bee3f8">firmware</text>

  <!-- arrows FW side -->
  <line x1="518" y1="202" x2="532" y2="180" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="582" y1="152" x2="582" y2="162" stroke="#4a5568" stroke-width="1.5"/>
  <line x1="632" y1="130" x2="674" y2="130" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="632" y1="190" x2="674" y2="190" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── User Firmware cloud ── -->
  <ellipse cx="752" cy="160" rx="98" ry="128" fill="#f0fff4" stroke="#9ae6b4" stroke-width="1.5"/>
  <text x="752" y="52" text-anchor="middle" font-size="12" font-weight="bold" fill="#276749">User Firmware</text>

  <rect x="674" y="70"  width="156" height="20" rx="4" fill="#ffffff" stroke="#c6f6d5" stroke-width="1"/>
  <text x="752" y="84" text-anchor="middle" font-size="10" fill="#276749">status.pll_lock</text>

  <rect x="674" y="96"  width="156" height="20" rx="4" fill="#ffffff" stroke="#c6f6d5" stroke-width="1"/>
  <text x="752" y="110" text-anchor="middle" font-size="10" fill="#276749">control.fir.sc(2).tap(3)</text>

  <rect x="674" y="122" width="156" height="20" rx="4" fill="#ffffff" stroke="#c6f6d5" stroke-width="1"/>
  <text x="752" y="136" text-anchor="middle" font-size="10" fill="#276749">status.counter_rate</text>

  <rect x="674" y="148" width="156" height="20" rx="4" fill="#ffffff" stroke="#c6f6d5" stroke-width="1"/>
  <text x="752" y="162" text-anchor="middle" font-size="10" fill="#276749">control.enable_flag</text>

  <rect x="674" y="174" width="156" height="20" rx="4" fill="#ffffff" stroke="#c6f6d5" stroke-width="1"/>
  <text x="752" y="188" text-anchor="middle" font-size="10" fill="#276749">status.snapshot_output</text>

  <rect x="674" y="200" width="156" height="20" rx="4" fill="#ffffff" stroke="#c6f6d5" stroke-width="1"/>
  <text x="752" y="214" text-anchor="middle" font-size="10" fill="#276749">control.sys_reset</text>

  <!-- ── VHDL records label ── -->
  <text x="752" y="244" text-anchor="middle" font-size="9" fill="#718096" font-style="italic">VHDL records / SV structs</text>
  <text x="108" y="244" text-anchor="middle" font-size="9" fill="#718096" font-style="italic">bigtree Python nodes</text>
</svg>
